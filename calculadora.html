<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Calculadora</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #6a5cff, #4bc0c8);
    font-family: Arial, sans-serif;
}

.calculadora {
    background: #1e1e2f;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 0 25px rgba(0,0,0,0.4);
    width: 260px;
}

/* VISOR CENTRALIZADO */
.display {
    width: 100%;
    height: 70px;
    margin-bottom: 15px;
    background: #2c2c44;
    border-radius: 12px;
    display: flex;
    justify-content: center; /* CENTRALIZA HORIZONTAL */
    align-items: center;     /* CENTRALIZA VERTICAL */
    color: #fff;
    font-size: 26px;
    padding: 10px;
    box-sizing: border-box;
    text-align: center;
    overflow-x: auto;
}

.botoes {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

button {
    height: 55px;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    background: #3a3a5c;
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #50507a;
    transform: scale(1.05);
}

/* BOTÃO IGUAL */
.igual {
    background: #4bc0c8;
    color: black;
}

.igual:hover {
    background: #6be0e6;
}

/* BOTÃO C */
.clear {
    background: #ff5c5c;
}

.clear:hover {
    background: #ff7b7b;
}
</style>

</head>
<body>

<div class="calculadora">

    <div id="display" class="display">0</div>

    <div class="botoes">
        <button class="clear" onclick="limpar()">C</button>
        <button onclick="apagar()">←</button>
        <button onclick="inserir('/')">/</button>
        <button onclick="inserir('*')">*</button>

        <button onclick="inserir('7')">7</button>
        <button onclick="inserir('8')">8</button>
        <button onclick="inserir('9')">9</button>
        <button onclick="inserir('-')">-</button>

        <button onclick="inserir('4')">4</button>
        <button onclick="inserir('5')">5</button>
        <button onclick="inserir('6')">6</button>
        <button onclick="inserir('+')">+</button>

        <button onclick="inserir('1')">1</button>
        <button onclick="inserir('2')">2</button>
        <button onclick="inserir('3')">3</button>
        <button class="igual" onclick="calcular()">=</button>

        <button onclick="inserir('0')">0</button>
        <button onclick="inserir('.')">.</button>
    </div>

</div>

<script>
let display = document.getElementById("display");

function inserir(valor) {
    if (display.innerText === "0") {
        display.innerText = valor;
    } else {
        display.innerText += valor;
    }
}

function limpar() {
    display.innerText = "0";
}

function apagar() {
    display.innerText = display.innerText.slice(0, -1);
    if (display.innerText === "") {
        display.innerText = "0";
    }
}

function calcular() {
    try {
        display.innerText = eval(display.innerText);
    } catch {
        display.innerText = "Erro";
    }
}
</script>

</body>
</html>
