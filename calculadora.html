<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Calculadora Michelle</title>

    <style>
        body {
            background: linear-gradient(135deg, #1e1e2f, #3a3a5a);
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .calculadora {
            background: #2c2c3e;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            width: 280px;
        }

        input {
            width: 100%;
            height: 60px;
            font-size: 24px;
            margin-bottom: 15px;
            text-align: right;
            padding: 10px;
            border-radius: 10px;
            border: none;
            background: #1a1a2b;
            color: white;
        }

        .botoes {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            padding: 18px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: #444;
            color: white;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            background: #555;
        }

        button:active {
            transform: scale(0.95);
        }

        .operador {
            background: #ff9500;
        }

        .igual {
            background: #4CAF50;
            grid-row: span 2;
        }

        .limpar {
            background: #f44336;
        }

        .zero {
            grid-column: span 2;
        }
    </style>
</head>

<body>

    <div class="calculadora">
        <input type="text" id="tela" disabled>

        <div class="botoes">
            <button onclick="limpar()" class="limpar">C</button>
            <button onclick="add('/')" class="operador">÷</button>
            <button onclick="add('*')" class="operador">×</button>
            <button onclick="add('-')" class="operador">−</button>

            <button onclick="add('7')">7</button>
            <button onclick="add('8')">8</button>
            <button onclick="add('9')">9</button>
            <button onclick="add('+')" class="operador">+</button>

            <button onclick="add('4')">4</button>
            <button onclick="add('5')">5</button>
            <button onclick="add('6')">6</button>
            <button onclick="calcular()" class="igual">=</button>

            <button onclick="add('1')">1</button>
            <button onclick="add('2')">2</button>
            <button onclick="add('3')">3</button>

            <button onclick="add('0')" class="zero">0</button>
            <button onclick="add('.')">.</button>
        </div>
    </div>

    <script>
        function add(valor) {
            document.getElementById("tela").value += valor;
        }

        function limpar() {
            document.getElementById("tela").value = "";
        }

        function calcular() {
            let resultado = eval(document.getElementById("tela").value);
            document.getElementById("tela").value = resultado;
        }
    </script>

</body>

</html>
