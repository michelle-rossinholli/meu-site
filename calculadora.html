<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Calculadora Hacker Michelle</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial;
            background: linear-gradient(270deg, #000000, #0f0c29, #302b63);
            background-size: 600% 600%;
            animation: fundoAnimado 10s ease infinite;
        }

        @keyframes fundoAnimado {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        .calculadora {
            background: #050505;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 0 40px #00ffff;
            width: 300px;
            border: 1px solid #00ffff;
        }

        .titulo {
            text-align: center;
            color: #00ffff;
            margin-bottom: 15px;
            animation: piscar 1.5s infinite;
        }

        @keyframes piscar {
            0%,100% {opacity: 1;}
            50% {opacity: 0.4;}
        }

        input {
            width: 100%;
            height: 60px;
            font-size: 26px;
            margin-bottom: 15px;
            text-align: right;
            padding: 10px;
            border-radius: 10px;
            border: none;
            background: black;
            color: #00ffcc;
            box-shadow: 0 0 15px #00ffcc;
        }

        .botoes {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            padding: 18px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #111;
            color: white;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px #00ffff;
        }

        button:active {
            transform: scale(0.95);
        }

        .numero {
            color: #00e5ff;
        }

        .operador {
            color: #ff00ff;
        }

        .igual {
            background: #00ff88;
            color: black;
            grid-row: span 2;
            box-shadow: 0 0 20px #00ff88;
        }

        .limpar {
            background: #ff0033;
            box-shadow: 0 0 15px #ff0033;
        }

        .zero {
            grid-column: span 2;
        }

        .voltar {
            margin-top: 10px;
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: none;
            background: #00ffff;
            color: black;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="calculadora">

        <div class="titulo">⚡ HACKER MODE ⚡</div>

        <input type="text" id="tela" disabled>

        <div class="botoes">
            <button onclick="som(); limpar()" class="limpar">C</button>
            <button onclick="som(); add('/')" class="operador">÷</button>
            <button onclick="som(); add('*')" class="operador">×</button>
            <button onclick="som(); add('-')" class="operador">−</button>

            <button onclick="som(); add('7')" class="numero">7</button>
            <button onclick="som(); add('8')" class="numero">8</button>
            <button onclick="som(); add('9')" class="numero">9</button>
            <button onclick="som(); add('+')" class="operador">+</button>

            <button onclick="som(); add('4')" class="numero">4</button>
            <button onclick="som(); add('5')" class="numero">5</button>
            <button onclick="som(); add('6')" class="numero">6</button>
            <button onclick="som(); calcular()" class="igual">=</button>

            <button onclick="som(); add('1')" class="numero">1</button>
            <button onclick="som(); add('2')" class="numero">2</button>
            <button onclick="som(); add('3')" class="numero">3</button>

            <button onclick="som(); add('0')" class="numero zero">0</button>
            <button onclick="som(); add('.')">.</button>
        </div>

        <button class="voltar" onclick="window.location.href='index.html'">
            ⬅ Voltar para o site
        </button>

    </div>

    <script>
        function add(valor) {
            document.getElementById("tela").value += valor;
        }

        function limpar() {
            document.getElementById("tela").value = "";
        }

        function calcular() {
            let resultado = eval(document.getElementById("tela").value);
            document.getElementById("tela").value = resultado;
        }

        function som() {
            let audio = new Audio("https://www.soundjay.com/button/sounds/button-16.mp3");
            audio.play();
        }
    </script>

</body>

</html>
