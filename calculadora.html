<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Calculadora Michelle</title>

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .calculadora {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 260px;
        }

        input {
            width: 100%;
            height: 50px;
            font-size: 20px;
            margin-bottom: 10px;
            text-align: right;
            padding: 10px;
        }

        .botoes {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            padding: 15px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #eee;
            transition: 0.2s;
        }

        button:hover {
            background: #ddd;
        }

        .igual {
            background: #4CAF50;
            color: white;
        }

        .limpar {
            background: #f44336;
            color: white;
        }
    </style>
</head>

<body>

    <div class="calculadora">
        <input type="text" id="tela" disabled>

        <div class="botoes">
            <button onclick="limpar()" class="limpar">C</button>
            <button onclick="add('/')">÷</button>
            <button onclick="add('*')">×</button>
            <button onclick="add('-')">−</button>

            <button onclick="add('7')">7</button>
            <button onclick="add('8')">8</button>
            <button onclick="add('9')">9</button>
            <button onclick="add('+')">+</button>

            <button onclick="add('4')">4</button>
            <button onclick="add('5')">5</button>
            <button onclick="add('6')">6</button>
            <button onclick="calcular()" class="igual">=</button>

            <button onclick="add('1')">1</button>
            <button onclick="add('2')">2</button>
            <button onclick="add('3')">3</button>

            <button onclick="add('0')" style="grid-column: span 2;">0</button>
            <button onclick="add('.')">.</button>
        </div>
    </div>

    <script>
        function add(valor) {
            document.getElementById("tela").value += valor;
        }

        function limpar() {
            document.getElementById("tela").value = "";
        }

        function calcular() {
            let resultado = eval(document.getElementById("tela").value);
            document.getElementById("tela").value = resultado;
        }
    </script>

</body>

</html>
