<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Calculadora</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle, #1a1a2e, #0f3460);
    font-family: Arial, sans-serif;
}

/* CAIXA */
.calculadora {
    background: #111;
    padding: 25px;
    border-radius: 25px;
    box-shadow: 0 0 40px #00f7ff;
    width: 270px;
    animation: surgir 0.6s ease;
}

/* ANIMAÇÃO ENTRADA */
@keyframes surgir {
    from {
        transform: scale(0.8);
        opacity: 0;
    }
    to {
        transform: scale(1);
        opacity: 1;
    }
}

/* TÍTULO */
.titulo {
    text-align: center;
    color: #00f7ff;
    margin-bottom: 15px;
    font-weight: bold;
    letter-spacing: 2px;
}

/* VISOR */
.display {
    width: 100%;
    height: 65px;
    margin-bottom: 15px;
    background: #000;
    border-radius: 12px;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #00f7ff;
    font-size: 26px;
    box-shadow: inset 0 0 10px #00f7ff;
}

/* BOTÕES */
.botoes {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

button {
    height: 55px;
    border: none;
    border-radius: 15px;
    font-size: 18px;
    background: #1f1f2e;
    color: white;
    cursor: pointer;
    transition: 0.15s;
}

/* ANIMAÇÃO CLICK */
button:active {
    transform: scale(0.9);
    box-shadow: 0 0 10px #00f7ff;
}

/* HOVER */
button:hover {
    background: #2f2f4f;
}

/* ESPECIAIS */
.clear { background: #ff4d4d; }
.igual { background: #00f7ff; color: black; font-weight: bold; }
</style>
</head>

<body>

<div class="calculadora">

<div class="titulo">CALCULADORA</div>

<div id="display" class="display">0</div>

<div class="botoes">
<button class="clear" onclick="clickSom(); limpar()">C</button>
<button onclick="clickSom(); apagar()">←</button>
<button onclick="clickSom(); inserir('/')">/</button>
<button onclick="clickSom(); inserir('*')">*</button>

<button onclick="clickSom(); inserir('7')">7</button>
<button onclick="clickSom(); inserir('8')">8</button>
<button onclick="clickSom(); inserir('9')">9</button>
<button onclick="clickSom(); inserir('-')">-</button>

<button onclick="clickSom(); inserir('4')">4</button>
<button onclick="clickSom(); inserir('5')">5</button>
<button onclick="clickSom(); inserir('6')">6</button>
<button onclick="clickSom(); inserir('+')">+</button>

<button onclick="clickSom(); inserir('1')">1</button>
<button onclick="clickSom(); inserir('2')">2</button>
<button onclick="clickSom(); inserir('3')">3</button>
<button class="igual" onclick="clickSom(); calcular()">=</button>

<button onclick="clickSom(); inserir('0')">0</button>
<button onclick="clickSom(); inserir('.')">.</button>
</div>

</div>

<script>
let display = document.getElementById("display");

/* SOM */
function clickSom(){
    let audio = new Audio("https://www.soundjay.com/button/sounds/button-16.mp3");
    audio.play();
}

function inserir(v){
    if(display.innerText === "0"){
        display.innerText = v;
    } else {
        display.innerText += v;
    }
}

function limpar(){
    display.innerText = "0";
}

function apagar(){
    display.innerText = display.innerText.slice(0,-1);
    if(display.innerText === ""){
        display.innerText = "0";
    }
}

function calcular(){
    try{
        display.innerText = eval(display.innerText);
    } catch{
        display.innerText = "Erro";
    }
}
</script>

</body>
</html>
