<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Calculadora Gamer</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: radial-gradient(circle, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .calculadora {
            background: #111;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 0 20px #00ffcc;
            width: 260px;
        }

        .display {
            width: 100%;
            height: 50px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: none;
            padding: 10px;
            font-size: 20px;
            text-align: right;
            background: #000;
            color: #00ffcc;
            box-shadow: inset 0 0 10px #00ffcc;
        }

        .botoes {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            height: 50px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
            background: #222;
            color: white;
            box-shadow: 0 0 5px #00ffcc;
        }

        button:hover {
            transform: scale(1.1);
            background: #00ffcc;
            color: #000;
        }

        .igual {
            background: #00ffcc;
            color: #000;
        }

        .igual:hover {
            background: #00ffaa;
        }

        .clear {
            background: #ff4d4d;
        }

        .clear:hover {
            background: #ff0000;
        }
    </style>
</head>

<body>

    <div class="calculadora">

        <input type="text" id="display" class="display" disabled>

        <div class="botoes">
            <button onclick="limpar()" class="clear">C</button>
            <button onclick="add('/')">÷</button>
            <button onclick="add('*')">×</button>
            <button onclick="add('-')">-</button>

            <button onclick="add('7')">7</button>
            <button onclick="add('8')">8</button>
            <button onclick="add('9')">9</button>
            <button onclick="add('+')">+</button>

            <button onclick="add('4')">4</button>
            <button onclick="add('5')">5</button>
            <button onclick="add('6')">6</button>
            <button onclick="calcular()" class="igual">=</button>

            <button onclick="add('1')">1</button>
            <button onclick="add('2')">2</button>
            <button onclick="add('3')">3</button>

            <button onclick="add('0')" style="grid-column: span 2;">0</button>
            <button onclick="add('.')">.</button>
        </div>

    </div>

    <script>
        function add(valor) {
            document.getElementById("display").value += valor;
        }

        function limpar() {
            document.getElementById("display").value = "";
        }

        function calcular() {
            try {
                let resultado = eval(document.getElementById("display").value);
                document.getElementById("display").value = resultado;
            } catch {
                alert("Erro na conta!");
            }
        }
    </script>

</body>

</html>
