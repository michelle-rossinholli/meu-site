<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Calculadora</title>

    <style>
        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial;
        }

        .calculadora {
            background: #222;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 20px #00ffcc;
        }

        .display {
            width: 100%;
            height: 50px;
            margin-bottom: 10px;
            font-size: 20px;
            text-align: right;
            padding: 10px;
            border: none;
            border-radius: 10px;
            background: #000;
            color: #0f0;
        }

        .botoes {
            display: grid;
            grid-template-columns: repeat(4, 60px);
            gap: 10px;
        }

        button {
            height: 50px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #333;
            color: white;
            transition: 0.2s;
        }

        button:hover {
            background: #00ffcc;
            color: black;
        }

        .igual {
            background: #00ffcc;
            color: black;
        }

        .limpar {
            background: red;
        }
    </style>
</head>

<body>

    <div class="calculadora">

        <input type="text" class="display" id="display" disabled>

        <div class="botoes">
            <button onclick="limpar()" class="limpar">C</button>
            <button onclick="apagar()">←</button>
            <button onclick="adicionar('/')">/</button>
            <button onclick="adicionar('*')">*</button>

            <button onclick="adicionar('7')">7</button>
            <button onclick="adicionar('8')">8</button>
            <button onclick="adicionar('9')">9</button>
            <button onclick="adicionar('-')">-</button>

            <button onclick="adicionar('4')">4</button>
            <button onclick="adicionar('5')">5</button>
            <button onclick="adicionar('6')">6</button>
            <button onclick="adicionar('+')">+</button>

            <button onclick="adicionar('1')">1</button>
            <button onclick="adicionar('2')">2</button>
            <button onclick="adicionar('3')">3</button>
            <button onclick="calcular()" class="igual">=</button>

            <button onclick="adicionar('0')">0</button>
            <button onclick="adicionar('.')">.</button>
        </div>

    </div>

    <script>
        function adicionar(valor) {
            document.getElementById("display").value += valor;
        }

        function limpar() {
            document.getElementById("display").value = "";
        }

        function apagar() {
            let valor = document.getElementById("display").value;
            document.getElementById("display").value = valor.slice(0, -1);
        }

        function calcular() {
            try {
                let resultado = eval(document.getElementById("display").value);
                document.getElementById("display").value = resultado;
            } catch {
                alert("Erro na conta");
            }
        }
    </script>

</body>

</html>
