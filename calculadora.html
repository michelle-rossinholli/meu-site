<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Michelle Dev</title>

    <!-- Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            font-family: Arial, sans-serif;
            margin: 0;
        }

        .container {
            background: white;
            width: 320px;
            margin: 80px auto;
            padding: 30px;
            text-align: center;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            animation: aparecer 1s ease;
        }
        
        }

        .foto:hover {
            transform: scale(1.1);
        }

        h1 {
            color: #333;
            font-size: 22px;
        }

        p {
            color: #777;
            font-size: 14px;
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, #0077b5, #005582);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 15px;
        }

        button:hover {
            transform: scale(1.05);
        }

        .whatsapp {
            background: linear-gradient(135deg, #25D366, #1ebe5d);
        }

        hr {
            border: none;
            height: 1px;
            background: #eee;
            margin: 20px 0;
        }

        h2 {
            margin-top: 20px;
            color: #333;
        }

        /* CARD */
        .card {
            background: #f9f9f9;
            border-radius: 15px;
            padding: 15px;
            margin-top: 15px;
            text-align: center;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.03);
        }

        /* ÍCONE */
        .icone-projeto {
            font-size: 40px;
            color: #00ffcc;
            text-shadow: 0 0 10px #00ffcc;
            margin-bottom: 10px;
        }

        .card h3 {
            margin: 5px 0;
            color: #333;
        }

        .card p {
            font-size: 12px;
        }

        .card a button {
            margin-top: 10px;
            background: linear-gradient(135deg, #ff4d4d, #cc0000);
        }

        @keyframes aparecer {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <img class="foto" src="foto.jpg" alt="Foto Michelle">

        <h1>Oi, eu sou a Michelle 👩‍💻</h1>
        <p>Desenvolvedora em formação 🚀</p>

        <p style="font-size:12px;">
            Apaixonada por tecnologia, criando meus primeiros projetos e evoluindo todos os dias 💻✨
        </p>

        <!-- LinkedIn -->
        <a href="https://www.linkedin.com/in/michelle-rossinholli/" target="_blank">
            <button>
                <i class="fab fa-linkedin"></i> Meu LinkedIn
            </button>
        </a>

        <!-- WhatsApp -->
        <button class="whatsapp" onclick="mensagem()">
            <i class="fab fa-whatsapp"></i> Fale comigo
        </button>

        <hr>

        <h2>Meus projetos</h2>

        <!-- CARD CALCULADORA -->
        <div class="card">

            <div class="icone-projeto">
                <i class="fas fa-calculator"></i>
            </div>

            <h3>Calculadora Gamer</h3>

            <p>Calculadora feita com HTML, CSS e JavaScript.</p>

            <a href="./calculadora.html">
                <button>Ver Projeto</button>
            </a>

        </div>

    </div>

    <script>
        function mensagem() {
            alert("Contato disponível mediante solicitação 😉");
        }
    </script>

</body>

</html>
