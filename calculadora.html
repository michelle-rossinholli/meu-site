<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>CALCULADOR</title>
    <!-- Meta viewport para mobilidade -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background: #111;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        .calculadora {
            background: #1e1e2f;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 0 25px #00f7ff;
            width: 100%;
            max-width: 320px;
        }
        .calculadora h1 {
            color: #fff;
            font-size: 24px;
            margin-bottom: 10px;
        }
        .calculadora input {
            width: 100%;
            height: 60px;
            border-radius: 10px;
            border: none;
            margin-bottom: 15px;
            text-align: right;
            font-size: 22px;
            padding: 10px;
            background: #2c2c3e;
            color: #fff;
        }
        .botoes {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        .botoes button {
            height: 50px;
            border-radius: 10px;
            border: none;
            background: #3a3a4f;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
        }
        .botoes button:hover {
            transform: scale(1.05);
            background: #50506a;
        }
        .clear {
            background: #ff4d4d !important;
        }
        .igual {
            background: #00f7ff !important;
            color: black;
        }
    </style>
</head>
<body>
    <div class="calculadora">
        <h1>CALCULADOR</h1>
        <input type="text" id="display" aria-label="visor da calculadora" disabled>
        <div class="botoes">
            <button class="clear" onclick="limpar()">C</button>
            <button onclick="apagar()">←</button>
            <button onclick="adicionar('/')">/</button>
            <button onclick="adicionar('*')">*</button>
            <button onclick="adicionar('7')">7</button>
            <button onclick="adicionar('8')">8</button>
            <button onclick="adicionar('9')">9</button>
            <button onclick="adicionar('-')">-</button>
            <button onclick="adicionar('4')">4</button>
            <button onclick="adicionar('5')">5</button>
            <button onclick="adicionar('6')">6</button>
            <button onclick="adicionar('+')">+</button>
            <button onclick="adicionar('1')">1</button>
            <button onclick="adicionar('2')">2</button>
            <button onclick="adicionar('3')">3</button>
            <button class="igual" onclick="resultado()">=</button>
            <button onclick="adicionar('0')">0</button>
            <button onclick="adicionar('.')">.</button>
        </div>
    </div>

    <script>
        function adicionar(valor) {
            document.getElementById("display").value += valor;
        }
        function limpar() {
            document.getElementById("display").value = "";
        }
        function apagar() {
            let visor = document.getElementById("display");
            visor.value = visor.value.slice(0, -1);
        }
        function resultado() {
            try {
                let res = eval(document.getElementById("display").value);
                document.getElementById("display").value = res;
            } catch {
                alert("Erro no cálculo");
            }
        }
    </script>
</body>
</html>
