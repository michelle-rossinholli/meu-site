<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Michelle Dev</title>

    <!-- Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            font-family: Arial, sans-serif;
            margin: 0;
        }

        .container {
            background: white;
            width: 320px;
            margin: 100px auto;
            padding: 30px;
            text-align: center;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            animation: aparecer 1s ease;
            transition: 0.3s;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        .foto {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            object-position: center top;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .foto:hover {
            transform: scale(1.1);
        }

        h1 {
            color: #333;
            font-size: 22px;
        }

        p {
            color: #777;
            font-size: 14px;
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, #0077b5, #005582);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 15px;
        }

        button:hover {
            transform: scale(1.05);
        }

        .whatsapp {
            background: linear-gradient(135deg, #25D366, #1ebe5d);
        }

        hr {
            border: none;
            height: 1px;
            background: #eee;
            margin: 20px 0;
        }

        .projeto {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 15px;
            margin-top: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .projeto:hover {
            transform: scale(1.03);
        }

        .projeto img {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .projeto h3 {
            margin: 5px 0;
            font-size: 16px;
        }

        .calc-box {
            display: none;
            margin-top: 20px;
        }

        .display {
            width: 100%;
            height: 40px;
            margin-bottom: 10px;
            text-align: right;
            font-size: 18px;
        }

        .botoes {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
        }
    </style>
</head>

<body>

    <div class="container">
        <img class="foto" src="foto.jpg" alt="Foto Michelle">

        <h1>Oi, eu sou a Michelle 👩‍💻</h1>
        <p>Desenvolvedora em formação 🚀</p>

        <p style="font-size:12px; margin-top:10px;">
            Apaixonada por tecnologia, criando meus primeiros projetos 💻✨
        </p>

        <!-- LinkedIn -->
        <a href="https://www.linkedin.com/in/michelle-rossinholli/" target="_blank">
            <button>
                <i class="fab fa-linkedin"></i> Meu LinkedIn
            </button>
        </a>

        <!-- WhatsApp -->
        <button class="whatsapp" onclick="mensagem()">
            <i class="fab fa-whatsapp"></i> Fale comigo
        </button>

        <hr>

        <p><b>Meus projetos:</b></p>

        <!-- CALCULADORA -->
        <div class="projeto">
            <h3>🧮 Calculadora</h3>
            <p>Calculadora funcional feita com JavaScript.</p>

            <button onclick="abrirCalculadora()">Ver projeto</button>

            <div class="calc-box" id="calc">
                <input type="text" id="display" class="display" disabled>

                <div class="botoes">
                    <button onclick="limpar()">C</button>
                    <button onclick="apagar()">←</button>
                    <button onclick="add('/')">/</button>
                    <button onclick="add('*')">*</button>

                    <button onclick="add('7')">7</button>
                    <button onclick="add('8')">8</button>
                    <button onclick="add('9')">9</button>
                    <button onclick="add('-')">-</button>

                    <button onclick="add('4')">4</button>
                    <button onclick="add('5')">5</button>
                    <button onclick="add('6')">6</button>
                    <button onclick="add('+')">+</button>

                    <button onclick="add('1')">1</button>
                    <button onclick="add('2')">2</button>
                    <button onclick="add('3')">3</button>
                    <button onclick="resultado()">=</button>

                    <button onclick="add('0')">0</button>
                    <button onclick="add('.')">.</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        function mensagem() {
            alert("Contato disponível 😉");
        }

        function abrirCalculadora() {
            document.getElementById("calc").style.display = "block";
        }

        function add(valor) {
            document.getElementById("display").value += valor;
        }

        function limpar() {
            document.getElementById("display").value = "";
        }

        function apagar() {
            let valor = document.getElementById("display").value;
            document.getElementById("display").value = valor.slice(0, -1);
        }

        function resultado() {
            try {
                let res = eval(document.getElementById("display").value);
                document.getElementById("display").value = res;
            } catch {
                alert("Erro");
            }
        }
    </script>

</body>

</html>
